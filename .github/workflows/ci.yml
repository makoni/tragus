name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Only system deps the non-UI crates need. The `tragus` UI crate is
      # excluded from CI until M3 introduces real UI code; at that point
      # we'll switch to a Flatpak-based job to get a recent libadwaita
      # (the Ubuntu runner ships an older one than our v1_8 feature gate).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy -p tragus-protocol -p tragus-bluetooth --all-targets

      - name: cargo test
        run: cargo test -p tragus-protocol -p tragus-bluetooth
